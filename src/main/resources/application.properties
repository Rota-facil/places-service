spring.application.name=places-service
server.port=8083

# DATABASE
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/places_database}
spring.datasource.username=${DATASOURCE_USERNAME:rota-facil}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}

# JPA + HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.client.fetch-registry=true